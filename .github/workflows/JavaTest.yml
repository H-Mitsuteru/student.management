# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# EC2の環境変数設定
env:
  EC2_USER: 'ec2-user'
  # EC2の接続アドレス(毎回接続する度に変わるけど・・・？)
  EC2_HOST: '13.113.37.232'
  # 送信元
  SRC_PATH: 'build/libs/*.jar'
  # 送信先へ上記の名前を変更してjarファイルを作成
  DEST_PATH: '/home/ec2-user/StudentManagement.jar'

jobs:
  # 実行名(任意)
  deploy:
    # 実行するコンテナ：使用するOS
    runs-on: ubuntu-latest

    # permissions:　<- 権限：今回はCD実装で read は削除する
    #  contents: read

    steps:
    # ubuntu に対する便利ツール(コード)が下記設定により、詳細設定をしなくても自動的にsetingされる
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      
    # GitHub Actions の workflow に 実行権限を付与する処理を追加します。
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Test with Gradle Wrapper
      run: ./gradlew test

    - name: Build with Gradle Wrapper
      run: ./gradlew bootJar

    - name: SCP Copy Application to ec2
      env:
        PRIVATE_KEY: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
      # パイプ -> 連続でコマンドを実行出来る様になる (private_keyを書き込む -> 権限600付与 / Yes,Noの確認をしない / DESTへ接続設定を送る)
      run: |
        echo "PRIVATE_KEY" > private_key && chmod 600 private_key
        scp -o StrictHostKeyChecking=no -i private_key $SRC_PATH $EC2_USER@$EC2_HOST:$DEST_PATH

    - name: SSH Application Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USER }}
        key: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
        envs: DEST_PATH
        # 以下のフォルダ先にファイルを作成する -> 既に存在する場合は実行しない
        # Linuxは絶対パス指定の為、必ず先頭は/から始まる。 etcは、Linuxの設定ファイル用フォルダ)
        script: |
          sudo yum update -y
          if [ -f /etc/systemd/system/StudentManagement.service ]; then
            echo "already exists Service File"
          else
          cat <<EOL | sudo tee -a /etc/systemd/system/StudentManagement.service
          [Unit]
          Description = StudentManagement App
          
          [Service]
          ExecStart = java -jar ${DEST_PATH}
          EnvironmentFile = /etc/sysconfig/StudentManagement
          Restart = no
          Type = simple
          User = ec2-user
          Group = ec2-user
          SuccessExitStatus = 143
          
          [Install]
          WantedBy = multi-user.target
          EOL
          fi
          
          sudo systemctl daemon-reload
          if sudo systemctl status StudentManagement 2>&1 | grep "Active: active (running)" ; then
            sudo systemctl restart StudentManagement
          else
            sudo systemctl start StudentManagement
          fi
